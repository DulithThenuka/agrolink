<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <script src="https://cdn.tailwindcss.com"></script>

<!-- Alpine.js (interactions) -->
<script src="https://unpkg.com/alpinejs" defer></script>

<!-- Animate.css -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Inter', sans-serif;
    }

    .glass {
        background: rgba(255,255,255,0.7);
        backdrop-filter: blur(10px);
    }
</style>

    <title>AgroLink - Connect Farmers & Buyers</title>

</head>

<body class="bg-gray-100">

<!-- Navbar -->
<div th:replace="layout/navbar :: navbar"></div>

<div class="flex">

    <!-- Sidebar -->
    <div th:replace="layout/sidebar :: sidebar"></div>

    <!-- Content -->
    <main class="flex-1 p-6">
        <div th:replace="${content}"></div>
    </main>

    <div x-data="{ show: false, message: '' }"
     x-on:notify.window="message = $event.detail.msg; show = true; setTimeout(() => show = false, 3000)"
     class="fixed top-5 right-5">

    <div x-show="show"
         x-transition
         class="bg-green-600 text-white px-4 py-2 rounded shadow-lg">

        <span x-text="message"></span>

    </div>

</div>

</div>

</body>
</html>
