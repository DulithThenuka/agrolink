<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>AgroLink - Connect Farmers & Buyers</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Alpine.js -->
    <script src="https://unpkg.com/alpinejs" defer></script>

    <!-- Animate.css -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
          rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        /* Premium gradient background */
        body {
            background: linear-gradient(135deg, #f0fdf4, #ecfdf5, #f0f9ff);
        }

        /* Glass effect */
        .glass {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* Smooth fade */
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(10px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>

</head>

<body class="min-h-screen flex flex-col">

<!-- ================= NAVBAR ================= -->
<div class="sticky top-0 z-50 shadow-sm">
    <div th:replace="layout/navbar :: navbar"></div>
</div>

<!-- ================= MAIN LAYOUT ================= -->
<div class="flex flex-1">

    <!-- Sidebar -->
    <div class="hidden md:block w-64">
        <div th:replace="layout/sidebar :: sidebar"></div>
    </div>

    <!-- Content -->
    <main class="flex-1 p-6 overflow-y-auto">

        <div class="fade-in">
            <div th:replace="${content}"></div>
        </div>

    </main>

</div>

<!-- ================= NOTIFICATION ================= -->
<div x-data="{ show: false, message: '' }"
     x-on:notify.window="
        message = $event.detail.msg;
        show = true;
        setTimeout(() => show = false, 3000)
     "
     class="fixed top-5 right-5 z-50">

    <div x-show="show"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-2"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="glass px-5 py-3 rounded-lg shadow-lg text-green-700 font-semibold border border-green-200">

        <span x-text="message"></span>

    </div>

</div>

</body>
</html>
