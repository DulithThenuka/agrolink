<div th:fragment="content">

<h1 class="text-2xl font-bold mb-6">Available Crops</h1>

<div class="grid grid-cols-1 md:grid-cols-3 gap-6">

    <div th:each="crop : ${crops.content}"
         class="bg-white rounded-xl shadow hover:shadow-lg transition p-4">

        <img th:src="@{'/uploads/' + ${crop.imageUrl}}"
             class="w-full h-40 object-cover rounded-md"/>

        <h2 class="text-lg font-bold mt-2" th:text="${crop.name}"></h2>

        <p class="text-gray-500" th:text="${crop.location}"></p>

        <div class="flex justify-between items-center mt-3">

            <span class="text-green-600 font-bold"
                  th:text="'$' + ${crop.price}"></span>

            <form th:action="@{/orders/place}" method="post">
                <input type="hidden" name="cropId" th:value="${crop.id}"/>

                <input type="number" name="quantity" value="1"
                       class="w-16 border rounded text-center"/>

                <button class="bg-green-600 text-white px-3 py-1 rounded hover:bg-green-700">
                    Buy
                </button>
            </form>

        </div>

    </div>

</div>

</div>
