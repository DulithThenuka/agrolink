<div th:fragment="content">

<h1 class="text-2xl font-bold mb-6">My Orders</h1>

<!-- EMPTY STATE -->
<div th:if="${#lists.isEmpty(orders)}">
    <div th:replace="components/feedback/empty-state :: empty('No orders yet')"></div>
</div>

<!-- TABLE -->
<div th:unless="${#lists.isEmpty(orders)}">

    <div th:replace="components/table :: table">

        <th:block th:fragment="content">

            <tr th:each="order : ${orders}"
                class="border-t hover:bg-gray-50 transition">

                <td class="px-4 py-3 font-medium"
                    th:text="${order.crop.name}"></td>

                <td class="px-4 py-3"
                    th:text="${order.quantity}"></td>

                <td class="px-4 py-3 text-green-600 font-semibold"
                    th:text="'$' + ${order.totalPrice}"></td>

                <!-- STATUS -->
                <td class="px-4 py-3">

                    <span class="px-2 py-1 text-xs rounded-full"
                          th:text="${order.status}"
                          th:classappend="
                            ${order.status == 'PENDING'} ? ' bg-yellow-100 text-yellow-700' :
                            ${order.status == 'CONFIRMED'} ? ' bg-blue-100 text-blue-700' :
                            ${order.status == 'DELIVERED'} ? ' bg-green-100 text-green-700' :
                            ${order.status == 'CANCELLED'} ? ' bg-red-100 text-red-700' :
                            ' bg-gray-100 text-gray-700'
                          ">
                    </span>

                </td>

            </tr>

        </th:block>

    </div>

</div>

</div>
