<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head('Order Details')"></head>

<body>

<div th:replace="layout/base :: *"
     th:with="title='Order Details', content='pages/orders/details :: content'"></div>

<!-- ================== CONTENT ================== -->
<div th:fragment="content" class="max-w-4xl mx-auto">

    <!-- HEADER -->
    <div class="mb-6">
        <h1 class="text-2xl font-bold text-gray-800">
            Order #<span th:text="${order.id}"></span>
        </h1>
        <p class="text-sm text-gray-500">
            Placed on <span th:text="${#temporals.format(order.createdAt, 'dd MMM yyyy')}"></span>
        </p>
    </div>

    <!-- ================== MAIN CARD ================== -->
    <div class="bg-white rounded-xl shadow p-6 space-y-6">

        <!-- STATUS -->
        <div class="flex justify-between items-center">

            <h2 class="font-semibold text-gray-700">Order Status</h2>

            <span class="px-3 py-1 text-sm rounded-full"
                  th:text="${order.status}"
                  th:classappend="
                    ${order.status.name() == 'PENDING'} ? ' bg-yellow-100 text-yellow-700' :
                    ${order.status.name() == 'CONFIRMED'} ? ' bg-blue-100 text-blue-700' :
                    ${order.status.name() == 'DELIVERED'} ? ' bg-green-100 text-green-700' :
                    ' bg-gray-100 text-gray-700'
                  ">
            </span>

        </div>

        <!-- ================== CROP INFO ================== -->
        <div class="border-t pt-4">

            <h3 class="font-semibold text-gray-700 mb-3">Crop Details</h3>

            <div class="flex items-center gap-4">

                <img th:src="@{'/uploads/' + ${order.crop.imageUrl}}"
                     class="w-20 h-20 rounded object-cover"/>

                <div>
                    <p class="font-medium text-gray-800"
                       th:text="${order.crop.name}"></p>

                    <p class="text-sm text-gray-500"
                       th:text="${order.crop.category}"></p>
                </div>

            </div>

        </div>

        <!-- ================== ORDER INFO ================== -->
        <div class="border-t pt-4 grid grid-cols-2 gap-4 text-sm">

            <div>
                <p class="text-gray-500">Quantity</p>
                <p class="font-medium" th:text="${order.quantity}"></p>
            </div>

            <div>
                <p class="text-gray-500">Total Price</p>
                <p class="font-medium text-green-600"
                   th:text="'$' + ${order.totalPrice}"></p>
            </div>

        </div>

        <!-- ================== BUYER INFO ================== -->
        <div class="border-t pt-4">

            <h3 class="font-semibold text-gray-700 mb-2">Buyer</h3>

            <p class="text-gray-800"
               th:text="${order.buyer.email}"></p>

        </div>

        <!-- ================== ACTIONS ================== -->
        <div class="border-t pt-4 flex justify-between items-center">

            <a href="/orders/my"
               class="text-gray-500 hover:underline">
                ← Back to Orders
            </a>

            <!-- PAY BUTTON -->
            <a th:if="${order.status.name() == 'PENDING'}"
               th:href="@{'/payment/checkout/' + ${order.id}}"
               class="bg-green-600 text-white px-5 py-2 rounded-lg hover:bg-green-700">
                Pay Now
            </a>

        </div>

    </div>

</div>

</body>
</html>
