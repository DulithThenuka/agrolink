<div th:fragment="content">

<h1 class="text-2xl font-bold mb-6">Add Crop</h1>

<form th:action="@{/crops/add}" method="post" enctype="multipart/form-data"
      class="bg-white p-6 rounded shadow w-full md:w-1/2">

    <input type="text" name="name" placeholder="Crop Name"
           class="w-full border p-2 mb-3"/>

    <input type="text" name="category" placeholder="Category"
           class="w-full border p-2 mb-3"/>

    <input type="text" name="location" placeholder="Location"
           class="w-full border p-2 mb-3"/>

    <input type="number" name="price" placeholder="Price"
           class="w-full border p-2 mb-3"/>

    <input type="number" name="quantity" placeholder="Quantity"
           class="w-full border p-2 mb-3"/>

    <input type="file" name="image"
           class="w-full mb-3"/>

    <button class="bg-green-600 text-white px-4 py-2 rounded w-full">
        Save Crop
    </button>

</form>

</div>
