<div th:fragment="content">

<div class="flex items-center justify-center min-h-[80vh]">

    <form action="/auth/register" method="post"
          class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">

        <h2 class="text-2xl font-bold text-center mb-6">
            Register
        </h2>

        <div th:replace="components/forms/input :: input(
            'Name','name','text','Enter name','',null)"></div>

        <div th:replace="components/forms/input :: input(
            'Email','email','email','Enter email','',null)"></div>

        <div th:replace="components/forms/input :: input(
            'Password','password','password','Enter password','',null)"></div>

        <button type="submit"
                class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition">

            Register

        </button>

    </form>

</div>

</div>
