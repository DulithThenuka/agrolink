<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head('Login')"></head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="w-full max-w-md">

    <!-- CARD -->
    <div class="bg-white rounded-xl shadow-lg p-6 animate__animated animate__fadeIn">

        <!-- TITLE -->
        <h2 class="text-2xl font-bold text-center text-green-600 mb-6">
            Welcome Back 🌱
        </h2>

        <!-- SUCCESS MESSAGE -->
        <div th:if="${successMessage}"
             th:replace="components/feedback/alert :: alert('success', ${successMessage})">
        </div>

        <!-- ERROR MESSAGE -->
        <div th:if="${errorMessage}"
             th:replace="components/feedback/alert :: alert('error', ${errorMessage})">
        </div>

        <!-- FORM -->
        <form th:action="@{/auth/api/login}"
              method="post"
              class="space-y-4">

            <!-- EMAIL -->
            <div>
                <label class="block text-sm text-gray-600 mb-1">
                    Email
                </label>

                <input type="email"
                       name="email"
                       required
                       class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none"
                       placeholder="Enter your email"/>
            </div>

            <!-- PASSWORD -->
            <div>
                <label class="block text-sm text-gray-600 mb-1">
                    Password
                </label>

                <input type="password"
                       name="password"
                       required
                       class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none"
                       placeholder="Enter your password"/>
            </div>

            <!-- BUTTON -->
            <button type="submit"
                    class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition">
                Login
            </button>

        </form>

        <!-- REGISTER LINK -->
        <p class="text-sm text-center text-gray-500 mt-4">
            Don’t have an account?
            <a href="/auth/register"
               class="text-green-600 hover:underline">
                Register
            </a>
        </p>

    </div>

</div>

<!-- SCRIPTS -->
<div th:replace="fragments/scripts :: scripts"></div>

</body>
</html>
