<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head('Add Crop')"></head>

<body>

<div th:replace="layout/base :: *"
     th:with="title='Add Crop', content='pages/crops/form :: content'"></div>

<!-- ================== CONTENT ================== -->
<div th:fragment="content" class="max-w-3xl mx-auto">

    <div class="bg-white rounded-xl shadow p-6">

        <!-- TITLE -->
        <h2 class="text-2xl font-bold text-gray-800 mb-6">
            Add New Crop 🌾
        </h2>

        <!-- ERROR ALERT -->
        <div th:if="${#fields.hasErrors('*')}"
             th:replace="components/feedback/alert :: alert('error', 'Please fix the errors below')">
        </div>

        <!-- FORM -->
        <form th:action="@{/crops/add}"
              th:object="${crop}"
              method="post"
              enctype="multipart/form-data"
              class="space-y-5">

            <!-- NAME -->
            <div>
                <label class="block text-sm text-gray-600 mb-1">Crop Name</label>
                <input type="text"
                       th:field="*{name}"
                       class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none"/>

                <p class="text-xs text-red-500 mt-1"
                   th:if="${#fields.hasErrors('name')}"
                   th:errors="*{name}"></p>
            </div>

            <!-- CATEGORY -->
            <div>
                <label class="block text-sm text-gray-600 mb-1">Category</label>
                <input type="text"
                       th:field="*{category}"
                       placeholder="e.g. Vegetables, Fruits"
                       class="w-full px-3 py-2 border rounded-lg"/>
            </div>

            <!-- PRICE -->
            <div>
                <label class="block text-sm text-gray-600 mb-1">Price ($)</label>
                <input type="number"
                       step="0.01"
                       th:field="*{price}"
                       class="w-full px-3 py-2 border rounded-lg"/>

                <p class="text-xs text-red-500 mt-1"
                   th:if="${#fields.hasErrors('price')}"
                   th:errors="*{price}"></p>
            </div>

            <!-- QUANTITY -->
            <div>
                <label class="block text-sm text-gray-600 mb-1">Quantity</label>
                <input type="number"
                       th:field="*{quantity}"
                       class="w-full px-3 py-2 border rounded-lg"/>

                <p class="text-xs text-red-500 mt-1"
                   th:if="${#fields.hasErrors('quantity')}"
                   th:errors="*{quantity}"></p>
            </div>

            <!-- LOCATION -->
            <div>
                <label class="block text-sm text-gray-600 mb-1">Location</label>
                <input type="text"
                       th:field="*{location}"
                       class="w-full px-3 py-2 border rounded-lg"/>
            </div>

            <!-- DESCRIPTION -->
            <div>
                <label class="block text-sm text-gray-600 mb-1">Description</label>
                <textarea th:field="*{description}"
                          rows="3"
                          class="w-full px-3 py-2 border rounded-lg"></textarea>
            </div>

            <!-- IMAGE -->
            <div>
                <label class="block text-sm text-gray-600 mb-1">Crop Image</label>

                <input type="file"
                       name="image"
                       accept="image/*"
                       class="w-full border rounded-lg p-2"/>

                <p class="text-xs text-gray-400 mt-1">
                    Upload JPG/PNG image
                </p>
            </div>

            <!-- BUTTONS -->
            <div class="flex justify-between items-center mt-6">

                <!-- BACK -->
                <a href="/crops"
                   class="text-gray-600 hover:underline">
                    ← Back
                </a>

                <!-- SUBMIT -->
                <button type="submit"
                        class="bg-green-600 text-white px-5 py-2 rounded-lg hover:bg-green-700 transition">
                    Save Crop
                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
