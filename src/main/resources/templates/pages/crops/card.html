<div th:fragment="card(crop)">

    <div class="bg-white rounded-xl shadow hover:shadow-lg transition p-4">

        <!-- Image -->
        <img th:src="@{${crop.imageUrl}}" 
             class="w-full h-40 object-cover rounded-lg mb-3"/>

        <!-- Title -->
        <h3 class="text-lg font-semibold" 
            th:text="${crop.name}">Crop Name</h3>

        <!-- Category -->
        <p class="text-gray-500 text-sm"
           th:text="${crop.category}">Category</p>

        <!-- Price -->
        <p class="text-primary font-bold text-xl mt-2"
           th:text="'Rs. ' + ${crop.price}">Rs. 1000</p>

        <!-- Location -->
        <p class="text-sm text-gray-500 mt-1"
           th:text="${crop.farmer.location}">Colombo</p>

        <!-- Button -->
        <a th:href="@{'/crops/' + ${crop.id}}"
           class="block mt-3 text-center bg-primary text-white py-2 rounded-lg hover:bg-green-700">
            View Details
        </a>

    </div>

</div>
