<div>

    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold">Available Crops</h2>

        <a href="/crops/new"
           class="bg-primary text-white px-4 py-2 rounded-lg hover:bg-green-700">
            + Add Crop
        </a>
    </div>

    <!-- Search -->
    <form method="get" action="/crops" class="mb-6 flex gap-3">

        <input type="text" name="keyword"
               placeholder="Search crops..."
               class="w-full p-2 border rounded-lg"/>

        <button class="bg-primary text-white px-4 rounded-lg">
            Search
        </button>

    </form>

    <!-- Grid -->
    <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">

        <div th:each="crop : ${crops}"
             th:replace="pages/crops/card :: card(${crop})">
        </div>

    </div>

</div>
