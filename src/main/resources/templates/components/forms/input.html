<div th:fragment="input(label, name, type, placeholder, value, error)">

    <div class="mb-4">

        <!-- LABEL -->
        <label class="block text-sm font-medium text-gray-600 mb-1"
               th:text="${label}"></label>

        <!-- INPUT -->
        <input th:type="${type}"
               th:name="${name}"
               th:value="${value}"
               th:placeholder="${placeholder}"
               class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none transition"
               th:classappend="${error} != null ? ' border-red-500' : ' border-gray-300'"/>

        <!-- ERROR -->
        <p th:if="${error != null}"
           class="text-red-500 text-xs mt-1"
           th:text="${error}">
        </p>

    </div>

</div>
