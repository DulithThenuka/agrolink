<div th:fragment="alert(type, message)">

    <div x-data="{ show: true }"
         x-show="show"
         x-transition
         class="flex items-start gap-3 p-4 rounded-lg mb-4 border
                text-sm font-medium"

         th:classappend="
            ${type == 'success'} ? ' bg-green-100 text-green-700 border-green-200' :
            ${type == 'error'} ? ' bg-red-100 text-red-700 border-red-200' :
            ${type == 'warning'} ? ' bg-yellow-100 text-yellow-700 border-yellow-200' :
            ' bg-blue-100 text-blue-700 border-blue-200'
         ">

        <!-- ICON -->
        <div>
            <span th:if="${type == 'success'}">✅</span>
            <span th:if="${type == 'error'}">❌</span>
            <span th:if="${type == 'warning'}">⚠️</span>
            <span th:if="${type == 'info'}">ℹ️</span>
        </div>

        <!-- MESSAGE -->
        <div class="flex-1"
             th:text="${message}">
        </div>

        <!-- CLOSE BUTTON -->
        <button @click="show = false"
                class="text-gray-500 hover:text-gray-700 text-lg leading-none">
            &times;
        </button>

    </div>

</div>
