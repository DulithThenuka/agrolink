<div th:fragment="statCard(title, value, color)">

    <div class="bg-white rounded-xl shadow-md p-5 hover:shadow-lg transition duration-300 flex items-center justify-between">

        <!-- LEFT CONTENT -->
        <div>

            <p class="text-sm text-gray-500"
               th:text="${title}">
            </p>

            <h2 class="text-2xl font-bold mt-1"
                th:text="${value}"
                th:classappend="' text-' + ${color} + '-600'">
            </h2>

        </div>

        <!-- ICON -->
        <div class="w-12 h-12 flex items-center justify-center rounded-lg"
             th:classappend="' bg-' + ${color} + '-100 text-' + ${color} + '-600'">

            <!-- Default icon -->
            <span class="text-xl">📊</span>

        </div>

    </div>

</div>
