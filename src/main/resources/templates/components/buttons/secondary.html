<div th:fragment="secondary(text, type='button', loading=false)">

    <button th:type="${type}"
            class="inline-flex items-center justify-center gap-2 px-4 py-2 rounded-lg
                   border border-gray-300 text-gray-700 font-medium
                   bg-white hover:bg-gray-100
                   active:scale-95 transition
                   disabled:opacity-50 disabled:cursor-not-allowed"

            th:attr="disabled=${loading}">

        <!-- LOADING -->
        <svg th:if="${loading}"
             class="animate-spin h-4 w-4 text-gray-500"
             xmlns="http://www.w3.org/2000/svg"
             fill="none"
             viewBox="0 0 24 24">

            <circle class="opacity-25"
                    cx="12" cy="12" r="10"
                    stroke="currentColor" stroke-width="4"></circle>

            <path class="opacity-75"
                  fill="currentColor"
                  d="M4 12a8 8 0 018-8v8z"></path>

        </svg>

        <!-- TEXT -->
        <span th:text="${text}"></span>

    </button>

</div>
