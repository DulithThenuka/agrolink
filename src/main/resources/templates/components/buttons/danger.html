<div th:fragment="dangerConfirm(text, action, id)">

    <div x-data="{ open: false }">

        <!-- BUTTON -->
        <button @click="open = true"
                type="button"
                class="inline-flex items-center gap-2 px-4 py-2 rounded-lg
                       bg-red-600 text-white font-medium
                       hover:bg-red-700 active:scale-95 transition">

            🗑 <span th:text="${text}"></span>
        </button>

        <!-- MODAL -->
        <div x-show="open"
             x-transition
             class="fixed inset-0 flex items-center justify-center bg-black bg-opacity-40 z-50">

            <div class="bg-white p-6 rounded-xl shadow-lg w-full max-w-sm">

                <h2 class="text-lg font-semibold mb-2">
                    Confirm Delete
                </h2>

                <p class="text-sm text-gray-500 mb-4">
                    This action cannot be undone.
                </p>

                <div class="flex justify-end gap-3">

                    <!-- CANCEL -->
                    <button @click="open = false"
                            class="px-3 py-1 border rounded-lg hover:bg-gray-100">
                        Cancel
                    </button>

                    <!-- DELETE -->
                    <form th:action="${action}" method="post">
                        <input type="hidden" name="id" th:value="${id}"/>

                        <button type="submit"
                                class="px-3 py-1 bg-red-600 text-white rounded-lg hover:bg-red-700">
                            Delete
                        </button>
                    </form>

                </div>

            </div>

        </div>

    </div>

</div>
